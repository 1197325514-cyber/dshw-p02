project:
  type: book
  output-dir: docs

book:
  title: "P01：金融数据获取、管理与初步分析"
  author: "林川胜"
  date: "2026年4月"
  date-format: "YYYY年MM月"

  sidebar:
    title: "DS Homework"
    style: floating
    search: true
    background: light
    tools:
      - icon: github
        href: https://github.com/1197325514-cyber/dshw-p01
      - icon: house-fill
        href: https://1197325514-cyber.github.io/dshw-p01/

  page-footer:
    center: |
      学号：25210071 | 作者：林川胜
    right: |
      课程：金融数据分析与建模

  site-url: https://1197325514-cyber.github.io/dshw-p01/
  repo-url: https://github.com/1197325514-cyber/dshw-p01
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - part: "**数据篇**"
      chapters:
        - chapters/01-download.qmd
        - chapters/02-clean.qmd
    - part: "**分析篇**"
      chapters:
        - chapters/03-analysis.qmd
        - chapters/04-capm.qmd
        - chapters/05-macro.qmd
    - summary.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    linestretch: 1.6
    fontsize: 11.5pt
    number-sections: true
    link-external-newwindow: true
    highlight: true
    highlight-style: atom-one
    code-fold: true
    code-summary: "显示代码"
    code-line-numbers: false
    code-overflow: wrap
    callout-appearance: default
    anchor-sections: true
    smooth-scroll: true

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

language:
  title-block-author-single: "作者"
  title-block-published: "发布日期"
  toc-title: "目录"
  chapter-title: "章"
  appendix-title: "附录"
  callout-tip-title: "提示"
  callout-note-title: "注意"
  callout-warning-title: "警告"
  callout-important-title: "重要"

crossref:
  fig-title: "图"
  tbl-title: "表"
  eq-title: "公式"
  fig-prefix: "图"
  tbl-prefix: "表"
  eq-prefix: "公式"
